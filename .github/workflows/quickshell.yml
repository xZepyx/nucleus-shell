name: Shell Runtime Check

on:
  push:
    paths:
      - "quickshell/**"
  pull_request:
    paths:
      - "quickshell/**"
  workflow_dispatch:

jobs:
  run-quickshell:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Install base deps
        run: |
          pacman -Sy --noconfirm git base-devel sudo

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install yay (AUR helper)
        run: |
          sudo -u builder bash -c "
            cd ~ &&
            git clone https://aur.archlinux.org/yay.git &&
            cd yay &&
            makepkg -si --noconfirm
          "

      - name: Install Major
        run: |
          sudo -u builder yay -S --noconfirm quickshell-git nucleus-shell

      - name: Install runtime deps
        run: |
          pacman -S --noconfirm weston xorg-xwayland

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run quickshell (Wayland fixed)
        run: |
          # Setup runtime dir (FIXES YOUR ERROR)
          export XDG_RUNTIME_DIR=/tmp/runtime-dir
          mkdir -p $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR

          # Start weston
          weston --backend=headless-backend.so --socket=wayland-1 --idle-time=0 &
          sleep 2

          # Tell Qt to use Wayland
          export WAYLAND_DISPLAY=wayland-1
          export QT_QPA_PLATFORM=wayland

          # Run quickshell
          timeout 60s qs -p quickshell/nucleus-shell/shell.qml > log.txt 2>&1 || true

          cat log.txt

          # Fail only on real errors
          if grep -i "error" log.txt; then
            echo "Errors found"
            exit 1
          fi
